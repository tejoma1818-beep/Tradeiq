<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef,useCallback}=React;

// ── API Config ───────────────────────────────────────────────────────────────
// ── Finnhub — free real-time stock API, CORS-enabled, works from file:// ────
const FHUB='https://finnhub.io/api/v1';
async function fhQuote(sym,key){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),5000);
  const r=await fetch(`${FHUB}/quote?symbol=${sym}&token=${key}`,{signal:ctrl.signal});
  clearTimeout(tid);
  if(!r.ok)throw new Error('FH quote failed');
  const d=await r.json();
  // When market is closed, d.c is 0 — use prevClose as the price
  const price=d.c||d.pc;
  if(!price||price===0)throw new Error('No Finnhub data for '+sym);
  // If market closed (c==0), change vs the day before prev close
  const change=d.c?d.d||0:0;
  const pct=d.c?d.dp||0:0;
  const isMarketOpen=d.c>0;
  return{price,change,pct,high:d.h||price,low:d.l||price,open:d.o||price,prevClose:d.pc,isMarketOpen};
}
async function fhCandle(sym,range,key){
  const now=Math.floor(Date.now()/1000);
  const s=86400;
  const res={'1D':'5','1W':'60','1M':'D','3M':'D','6M':'D','1Y':'D','5Y':'W','10Y':'W','MAX':'M'}[range]||'D';
  const from={'1D':now-s,'1W':now-7*s,'1M':now-32*s,'3M':now-93*s,'6M':now-185*s,
    '1Y':now-370*s,'5Y':now-1830*s,'10Y':now-3660*s,'MAX':now-10950*s}[range]||(now-93*s);
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),1500);
  const r=await fetch(`${FHUB}/stock/candle?symbol=${sym}&resolution=${res}&from=${from}&to=${now}&token=${key}`,{signal:ctrl.signal});
  clearTimeout(tid);
  if(!r.ok)throw new Error('FH candle failed');
  const d=await r.json();
  if(d.s!=='ok'||!d.c||d.c.length<2)throw new Error('No candle data');
  const maxPts=150;
  const step=Math.max(1,Math.floor(d.c.length/maxPts));
  const out=[];
  for(let i=0;i<d.c.length;i+=step){
    out.push({date:fmtDateForRange(new Date(d.t[i]*1000),range),price:d.c[i]});
  }
  // ensure last point is always included
  const last=d.c.length-1;
  if(out.length===0||out[out.length-1].price!==d.c[last]){
    out.push({date:fmtDateForRange(new Date(d.t[last]*1000),range),price:d.c[last]});
  }
  return out;
}
async function fhSearch(q,key){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),4000);
  const r=await fetch(`${FHUB}/search?q=${encodeURIComponent(q)}&token=${key}`,{signal:ctrl.signal});
  clearTimeout(tid);
  if(!r.ok)throw new Error('FH search failed');
  const d=await r.json();
  return(d.result||[]).filter(x=>x.type==='Common Stock').slice(0,8).map(x=>({
    ticker:x.symbol,name:x.description,cat:'stock',exchange:x.primaryExchange||'',isYF:true
  }));
}
async function fhMetrics(sym,key){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),3500);
  const r=await fetch(`${FHUB}/stock/metric?symbol=${sym}&metric=all&token=${key}`,{signal:ctrl.signal});
  clearTimeout(tid);
  if(!r.ok)throw new Error('FH metrics failed');
  const d=await r.json();
  const m=d.metric||{};
  const fmt$=(v,dp=2)=>v!=null?'$'+(v>=1000?Math.round(v).toLocaleString():parseFloat(v).toFixed(dp)):null;
  const fmtPct=(v)=>v!=null?parseFloat(v).toFixed(2)+'%':null;
  return{
    eps:fmt$(m.epsInclExtraAnnual||m.epsNormalizedAnnual),
    beta:m.beta!=null?parseFloat(parseFloat(m.beta).toFixed(2)):null,
    divYield:fmtPct(m.dividendYieldIndicatedAnnual||m.currentDividendYieldTTM),
    hi52:fmt$(m['52WeekHigh']),
    lo52:fmt$(m['52WeekLow']),
    debtEq:m['totalDebt/totalEquityAnnual']!=null?parseFloat(parseFloat(m['totalDebt/totalEquityAnnual']).toFixed(2)):null,
    roe:fmtPct(m.roeTTM||m['roeRfy']),
    peRaw:m.peInclExtraTTM||m.peTTM||null,
  };
}
async function fhRecommendation(sym,key){
  const ctrl=new AbortController();
  const tid=setTimeout(()=>ctrl.abort(),4000);
  const r=await fetch(`${FHUB}/stock/recommendation?symbol=${sym}&token=${key}`,{signal:ctrl.signal});
  clearTimeout(tid);
  if(!r.ok)return null;
  const d=await r.json();
  if(!d||!d[0])return null;
  const l=d[0];
  const total=(l.strongBuy||0)+(l.buy||0)+(l.hold||0)+(l.sell||0)+(l.strongSell||0);
  if(!total)return null;
  const bull=((l.strongBuy||0)+(l.buy||0))/total;
  const bear=((l.sell||0)+(l.strongSell||0))/total;
  if(bull>=0.65)return'Strong Buy';
  if(bull>=0.50)return'Buy';
  if(bear>=0.40)return'Sell';
  return'Hold';
}

const CG='https://api.coingecko.com/api/v3';
// Simple memory cache
const CACHE=new Map();
function gc(k,ttl=60000){const e=CACHE.get(k);if(e&&Date.now()-e.ts<ttl)return e.d;return null;}
function sc(k,d){CACHE.set(k,{d,ts:Date.now()});}

// ── Smart fetch: races all CORS proxies simultaneously — fastest wins ────────
const CORS_PROXIES=[
  u=>u,                                                               // 1. Direct
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,  // 2. allorigins
  u=>`https://corsproxy.io/?${u}`,                                    // 3. corsproxy.io
  u=>`https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(u)}`, // 4. codetabs
];
async function smartFetch(url,timeoutMs=2500){
  // Fire all proxies at once — Promise.any resolves with the first OK response
  const tryProxy=proxy=>{
    const ctrl=new AbortController();
    const tid=setTimeout(()=>ctrl.abort(),timeoutMs);
    return fetch(proxy(url),{signal:ctrl.signal})
      .then(r=>{clearTimeout(tid);if(r.ok)return r;throw new Error('not ok');})
      .catch(e=>{clearTimeout(tid);throw e;});
  };
  try{return await Promise.any(CORS_PROXIES.map(tryProxy));}
  catch(e){throw new Error('All fetch attempts failed for: '+url);}
}
function yfurl(url){return url;} // kept for compat — smartFetch handles proxying

// ── Stooq.com — free stock data, CORS-friendly, no API key needed ────────────
// Stooq serves browser-embeddable CSV data designed for public use.
function toStooqSym(ticker,cat){
  const cm={GOLD:'xauusd',SILVER:'xagusd',OIL:'clusd',NATGAS:'ngusd',COPPER:'hgusd',PLATINUM:'plusd',WHEAT:'zwusd'};
  if(cm[ticker])return cm[ticker];
  return ticker.toLowerCase()+'.us';
}
async function stooqQuote(ticker,cat){
  const k=`stq_${ticker}`;const c=gc(k,25000);if(c)return c;
  const sym=toStooqSym(ticker,cat);
  const url=`https://stooq.com/q/l/?s=${sym}&f=sd2ohlcvn&e=csv`;
  const r=await smartFetch(url);
  const text=await r.text();
  const lines=text.trim().split('\n');
  if(lines.length<2)throw new Error('No Stooq data');
  const vals=lines[1].split(',');
  // cols: Symbol,Date,Open,High,Low,Close,Volume,Name
  const price=parseFloat(vals[5]);
  const open=parseFloat(vals[2]);
  if(!price||price<=0)throw new Error('Bad Stooq price');
  const change=price-open;
  const pct=open>0?((price-open)/open)*100:0;
  const name=vals[7]||ticker;
  const out={price,change,pct,name};
  sc(k,out);return out;
}
async function stooqChart(ticker,cat){
  const k=`stqc_${ticker}`;const c=gc(k,300000);if(c)return c;
  const sym=toStooqSym(ticker,cat);
  const end=new Date(),start=new Date();
  start.setDate(start.getDate()-130);
  const fmt=d=>d.toISOString().slice(0,10).replace(/-/g,'');
  const url=`https://stooq.com/q/d/l/?s=${sym}&d1=${fmt(start)}&d2=${fmt(end)}&i=d`;
  const r=await smartFetch(url);
  const text=await r.text();
  const lines=text.trim().split('\n').slice(1);
  // cols: Date,Open,High,Low,Close,Volume
  const data=lines.map(line=>{
    const p=line.split(',');
    const price=parseFloat(p[4]);
    if(!p[0]||isNaN(price)||price<=0)return null;
    const d=new Date(p[0]);
    return{date:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),price};
  }).filter(Boolean).slice(-90);
  if(data.length<5)throw new Error('Insufficient chart data');
  sc(k,data);return data;
}
async function stooqBatch(tickers){
  const k=`stqb_${tickers.length}_${tickers[0]}`;const c=gc(k,60000);if(c)return c;
  const syms=tickers.map(t=>t.toLowerCase()+'.us').join(',');
  const url=`https://stooq.com/q/l/?s=${syms}&f=sd2ohlcvn&e=csv`;
  const r=await smartFetch(url);
  const text=await r.text();
  const lines=text.trim().split('\n').slice(1);
  const results=lines.map(line=>{
    const p=line.split(',');
    const ticker=p[0]?.replace(/\.US$/i,'').toUpperCase();
    const price=parseFloat(p[5]);
    const open=parseFloat(p[2]);
    if(!ticker||!price||price<=0)return null;
    const pct=open>0?((price-open)/open)*100:0;
    const change=price-open;
    const name=p[7]||ticker;
    return{ticker,name,price,change,pct,cat:'stock',sector:'Stock',isYF:false,risk:50,cap:'—'};
  }).filter(Boolean);
  sc(k,results);return results;
}

// ── Chart range helpers ──────────────────────────────────────────────────────
const RANGE_DAYS={'1D':1,'1W':7,'1M':30,'3M':90,'6M':180,'1Y':365,'5Y':1825,'10Y':3650,'MAX':10950};
// Per-session chart cache: key = ticker_range, value = {data, ts}
const RCACHE=new Map();
function rcGet(k,ttl){const e=RCACHE.get(k);if(e&&Date.now()-e.ts<ttl)return e.d;return null;}
function rcSet(k,d){RCACHE.set(k,{d,ts:Date.now()});}
// TTL per range (short ranges refresh more often)
function rangeTTL(range){return range==='1D'?60000:range==='1W'?120000:300000;}

function rangeDates(range){
  const now=new Date();
  const pad=n=>String(n).padStart(2,'0');
  const fmt=d=>`${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
  const sub=days=>{const d=new Date(now);d.setDate(d.getDate()-days);return d;};
  const end=fmt(now);
  switch(range){
    case '1D':return{d1:fmt(sub(3)),d2:end,i:'5'};
    case '1W':return{d1:fmt(sub(10)),d2:end,i:'d'};
    case '1M':return{d1:fmt(sub(35)),d2:end,i:'d'};
    case '3M':return{d1:fmt(sub(95)),d2:end,i:'d'};
    case '6M':return{d1:fmt(sub(185)),d2:end,i:'d'};
    case '1Y':return{d1:fmt(sub(370)),d2:end,i:'d'};
    case '5Y':return{d1:fmt(sub(1830)),d2:end,i:'w'};
    case '10Y':return{d1:fmt(sub(3660)),d2:end,i:'w'};
    case 'MAX':return{d1:'19900101',d2:end,i:'m'};
    default:return{d1:fmt(sub(95)),d2:end,i:'d'};
  }
}
function rangeCgDays(range){
  return{'1D':1,'1W':7,'1M':30,'3M':90,'6M':180,'1Y':365,'5Y':1825,'10Y':3650,'MAX':'max'}[range]||90;
}
// Format a Date object into the right label string for a given range
function fmtDateForRange(dt,range){
  if(range==='1D')return`${dt.getHours()}:${String(dt.getMinutes()).padStart(2,'0')}`;
  if(range==='1W')return dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  if(range==='1M'||range==='3M')return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if(range==='6M')return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  if(range==='1Y')return dt.toLocaleDateString('en-US',{month:'short',year:'2-digit'});
  // 5Y, 10Y, MAX — year only
  return String(dt.getFullYear());
}
// Decide which points get x-axis labels — at most 8, picking meaningful boundaries
function pickXLabels(data,range){
  const n=data.length;
  if(n===0)return[];
  // Short ranges: evenly spaced, max 7 labels
  if(range==='1D'||range==='1W'||range==='1M'||range==='3M'||range==='6M'){
    const maxL=range==='1D'?6:range==='1W'?7:6;
    const step=Math.max(1,Math.floor(n/maxL));
    const out=[];
    for(let i=0;i<n;i+=step)out.push(i);
    if(out[out.length-1]!==n-1)out.push(n-1);
    return out;
  }
  // 1Y: one label per month — format is "Jan '25" (7 chars unique)
  if(range==='1Y'){
    const seen=new Set();
    const idxs=[];
    data.forEach((d,i)=>{
      const key=d.date.slice(0,7); // "Jan '25" — unique per month+year
      if(!seen.has(key)){seen.add(key);idxs.push(i);}
    });
    // Show every other month if > 8 labels
    if(idxs.length>8){
      return idxs.filter((_,i)=>i%2===0||i===idxs.length-1);
    }
    return idxs;
  }
  // 5Y / 10Y / MAX: year boundaries only — format is "2022" (4 chars)
  const seen=new Set();
  const idxs=[];
  data.forEach((d,i)=>{
    const yr=d.date.trim().slice(-4);
    if(/^\d{4}$/.test(yr)&&!seen.has(yr)){seen.add(yr);idxs.push(i);}
  });
  // For MAX with many years, show every 2nd or 3rd year
  if(idxs.length>10){
    const step=range==='MAX'?Math.ceil(idxs.length/8):2;
    return idxs.filter((_,i)=>i%step===0||i===idxs.length-1);
  }
  return idxs.length>0?idxs:[0,n-1];
}
function syntheticBase(asset,range,cur){
  const pP=s=>s?parseFloat(String(s).replace(/[$,]/g,'')):NaN;
  const m=METRICS[asset.ticker];
  const hi52=pP(m&&m.hi52), lo52=pP(m&&m.lo52);
  const seed=rng(asset.ticker.charCodeAt(0)+1);
  const sf={'1D':0.005,'1W':0.02,'1M':0.06,'3M':0.15,'6M':0.25,'1Y':0.38,'5Y':0.58,'10Y':0.72,'MAX':0.85}[range]||0.15;
  if(!isNaN(hi52)&&!isNaN(lo52)&&hi52>lo52&&hi52>0){
    const posInRange=(cur-lo52)/(hi52-lo52);
    if(posInRange<0.30){
      const startFrac=0.65+(0.30-posInRange)*(range==='1Y'||range==='6M'?1.0:0.5);
      return hi52*Math.min(0.98, startFrac*(0.88+seed()*0.10));
    } else if(posInRange>0.70){
      const downMult=1-sf*(0.30+seed()*0.45);
      return Math.max(lo52*0.85, cur*downMult);
    } else {
      const jitter=(seed()-0.50)*sf*0.80;
      return Math.max(cur*0.10, cur*(1+jitter));
    }
  }
  return Math.max(cur*0.10, cur*(1-sf*(0.40+seed())));
}
function genSyntheticChart(base,current,range,seed){
  const pts={'1D':80,'1W':36,'1M':30,'3M':90,'6M':120,'1Y':80,'5Y':80,'10Y':80,'MAX':90}[range]||90;
  const days=RANGE_DAYS[range]||90;
  const r=rng(seed);
  const data=[];
  let p=base;
  const now=new Date(2026,2,31);
  const volMap={'1D':0.004,'1W':0.012,'1M':0.019,'3M':0.019,'6M':0.024,'1Y':0.034,'5Y':0.052,'10Y':0.068,'MAX':0.09};
  const vol=volMap[range]||0.019;
  for(let i=pts;i>=0;i--){
    const d=new Date(now);
    if(range==='1D'){
      const mins=(pts-i)*(390/pts);
      d.setHours(9,30+Math.round(mins),0,0);
      p=i>0?Math.max(base*0.92,p+(r()-0.48)*base*0.004):current;
    } else {
      d.setDate(d.getDate()-Math.round(i*(days/pts)));
      if(i>0){
        const drift=(current-p)/(i+1);
        const noise=(r()-0.50)*Math.abs(p)*vol;
        p=Math.max(base*0.03, p+drift+noise);
      } else {
        p=current;
      }
    }
    data.push({date:fmtDateForRange(d,range),price:parseFloat(p.toFixed(8))});
  }
  return data;
}

            const maxPts=200;
            const step=Math.max(1,Math.floor(pts.length/maxPts));
            const out=[];
            for(let i=0;i<pts.length;i+=step)
              out.push({date:fmtDateForRange(new Date(pts[i][0]),range),price:pts[i][1]});
            // always include last point
            const last=pts[pts.length-1];
            if(out[out.length-1]?.price!==last[1])
              out.push({date:fmtDateForRange(new Date(last[0]),range),price:last[1]});
            rcSet(cKey,out);return out;
          }
        }
      }catch(e){}
    }
  }
  // --- Stocks/ETFs/Commodities: Yahoo Finance v8 (direct, CORS-enabled, real daily closes) ---
  if(asset.cat!=='crypto'){
    try{
      const sym=encodeURIComponent(asset.yfSym||asset.ticker);
      const yfRng={'1D':'1d','1W':'5d','1M':'1mo','3M':'3mo','6M':'6mo','1Y':'1y','5Y':'5y','10Y':'10y','MAX':'max'}[range]||'3mo';
      const yfInt={'1D':'5m','1W':'1d','1M':'1d','3M':'1d','6M':'1d','1Y':'1d','5Y':'1wk','10Y':'1mo','MAX':'1mo'}[range]||'1d';
      const ctrl=new AbortController();
      const tid=setTimeout(()=>ctrl.abort(),8000);
      const r=await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${yfInt}&range=${yfRng}`,{signal:ctrl.signal});
      clearTimeout(tid);
      if(r.ok){
        const d=await r.json();
        const res=d.chart&&d.chart.result&&d.chart.result[0];
        if(res){
          const ts=res.timestamp||[];
          const closes=(res.indicators&&res.indicators.quote&&res.indicators.quote[0]&&res.indicators.quote[0].close)||[];
          if(ts.length>=5){
            const maxPts=200;
            const step=Math.max(1,Math.floor(ts.length/maxPts));
            const out=[];
            for(let i=0;i<ts.length;i+=step){
              const price=closes[i];
              if(price==null||isNaN(price)||price<=0)continue;
              out.push({date:fmtDateForRange(new Date(ts[i]*1000),range),price:parseFloat(price.toFixed(4))});
            }
            // always include last real close
            for(let j=ts.length-1;j>=0;j--){
              if(closes[j]>0){
                const lp=parseFloat(closes[j].toFixed(4));
                if(!out.length||out[out.length-1].price!==lp)
                  out.push({date:fmtDateForRange(new Date(ts[j]*1000),range),price:lp});
                break;
              }
            }
            if(out.length>=5){rcSet(cKey,out);return out;}
          }
        }
      }
    }catch(e){}
  }
  // --- Stooq fallback (via CORS proxy) ---
  if(asset.cat!=='crypto'){
    try{
      const sym=toStooqSym(asset.ticker,asset.cat);
      const {d1,d2,i}=rangeDates(range);

      const r=await smartFetch(url,3000);

        const lines=text.trim().split('\n').slice(1);
        if(lines.length>=2){
          const maxPts=200;
          const step=Math.max(1,Math.floor(lines.length/maxPts));
          const out=lines.filter((_,i)=>i%step===0||i===lines.length-1).map(line=>{
            const p=line.split(',');
            const price=parseFloat(p[4]);

        }
      }

  }
  // --- Synthetic fallback (uses METRICS hi52/lo52 for realistic bounds) ---
  const cur=asset.price||100;
  const base=syntheticBase(asset,range,cur);
  return genSyntheticChart(base,cur,range,asset.ticker.charCodeAt(0)*7+days);
}

function rng(seed){let s=seed;return()=>{s=(s*9301+49297)%233280;return s/233280;}}
function genChart(base,current,days,seed){
  const r=rng(seed),data=[];let p=base;
  for(let i=days;i>=0;i--){
    const d=new Date(2026,2,30);d.setDate(d.getDate()-i);
    p=i>0?Math.max(base*0.6,p+(r()-0.47)*base*0.03):current;
    data.push({date:d.toLocaleDateString('en-US',{month:'short',day:'numeric'}),price:parseFloat(p.toFixed(8))});

function genOHLC(cdArr,seed){
  const r=rng(seed||42);
  return cdArr.map((d,i)=>{
    const close=d.price;
    const open=i>0?cdArr[i-1].price:close*(1+(r()-0.5)*0.02);
    const body=Math.abs(close-open);
    const minWick=close*0.015;
    const upWick=minWick+body*(2+r()*3);
    const dnWick=minWick+body*(2+r()*3);
    const high=Math.max(open,close)+upWick;
    const low=Math.min(open,close)-dnWick;
    const vol=Math.floor((r()*0.8+0.2)*8000000+500000);
    return{date:d.date,open,high,low,close,vol};
  });
}

  if(p>=1)return'$'+p.toFixed(2);
  if(p>=0.01)return'$'+p.toFixed(4);
  if(p>=0.0001)return'$'+p.toFixed(6);
  return'$'+p.toFixed(8);
}

// For any ticker not in the map, compute from risk: generally correlated but capped
function getReward(asset){
  if(REWARD[asset.ticker]!=null)return REWARD[asset.ticker];
  const r=asset.risk||50;
  return Math.min(95,Math.max(10,Math.round(r*0.82+18)));
}

function getMetricInsight(key,rawVal){
  const n=parseFloat(rawVal);
  switch(key){
    case 'pe':
      if(rawVal==='N/A'||!rawVal||isNaN(n))return{text:'Not applicable for this asset type',signal:'neutral'};
      if(n>60)return{text:'Very expensive — market expects explosive growth',signal:'warn'};
      if(n>40)return{text:'Premium valuation — growth needs to deliver',signal:'warn'};
      if(n>20)return{text:'Fair price for a quality company',signal:'good'};
      if(n>0)return{text:'Below-market value — potential bargain',signal:'good'};
      return{text:'Negative earnings — company is losing money',signal:'bad'};
    case 'eps':
      if(rawVal==='N/A'||!rawVal)return{text:'Not applicable for this asset type',signal:'neutral'};
      if(n>20)return{text:'Exceptional earnings power per share',signal:'good'};
      if(n>5)return{text:'Strong earnings — company is very profitable',signal:'good'};
      if(n>0)return{text:'Profitable, but earnings are modest',signal:'neutral'};
      return{text:'Negative EPS — company is currently unprofitable',signal:'bad'};
    case 'beta':
      if(isNaN(n))return{text:'Volatility data unavailable',signal:'neutral'};
      if(n>=2.5)return{text:'Extremely volatile — moves 2.5x the market',signal:'bad'};
      if(n>=1.5)return{text:'High volatility — amplifies market swings',signal:'warn'};
      if(n>=1.1)return{text:'Slightly more volatile than the market',signal:'neutral'};
      if(n>=0.8)return{text:'Moves roughly in line with the market',signal:'good'};
      return{text:'Low volatility — stable, defensive asset',signal:'good'};
    case 'divYield':
      if(rawVal==='0%'||rawVal==='N/A'||!rawVal)return{text:'No dividend — reinvests profits for growth',signal:'neutral'};
      if(n>6)return{text:'Very high yield — verify it\'s sustainable',signal:'warn'};
      if(n>3)return{text:'Strong income stream for investors',signal:'good'};
      if(n>1)return{text:'Reliable dividend adds to total return',signal:'good'};
      return{text:'Small dividend — mostly a growth play',signal:'neutral'};
    case 'hi52':
      return{text:'Highest price in the past 52 weeks',signal:'neutral'};
    case 'lo52':
      return{text:'Lowest price in the past 52 weeks',signal:'neutral'};
    case 'debtEq':
      if(rawVal==='N/A'||!rawVal||isNaN(n))return{text:'Not applicable for this asset',signal:'neutral'};
      if(n<0)return{text:'Technically insolvent on paper — monitor carefully',signal:'warn'};
      if(n<0.4)return{text:'Very low debt — financially fortress-like',signal:'good'};
      if(n<1)return{text:'Conservative debt levels — well managed',signal:'good'};
      if(n<2)return{text:'Moderate leverage — acceptable for large firms',signal:'neutral'};
      return{text:'High debt load — adds financial risk',signal:'bad'};
    case 'roe':
      if(rawVal==='N/A'||rawVal==='N/A%'||!rawVal||isNaN(n))return{text:'Not applicable for this asset',signal:'neutral'};
      if(n<0)return{text:'Negative ROE — destroying shareholder value',signal:'bad'};
      if(n>80)return{text:'Extraordinary return on shareholder capital',signal:'good'};
      if(n>25)return{text:'Excellent capital efficiency',signal:'good'};
      if(n>12)return{text:'Decent profitability, room to improve',signal:'neutral'};
      return{text:'Below-average return on equity',signal:'bad'};
    case 'analystRating':
      if(rawVal==='Strong Buy')return{text:'Wall Street has high conviction — broad bullish consensus',signal:'good'};
      if(rawVal==='Buy')return{text:'Analysts are generally bullish on this asset',signal:'good'};
      if(rawVal==='Hold')return{text:'Analysts see limited near-term upside',signal:'neutral'};
      if(rawVal==='Sell')return{text:'Analysts recommend reducing or exiting position',signal:'bad'};
      return{text:'No analyst consensus available',signal:'neutral'};
    case 'shortFloat':
      if(rawVal==='N/A'||!rawVal||isNaN(n))return{text:'Short interest data not available',signal:'neutral'};
      if(n>20)return{text:'Heavily shorted — significant bearish bets against it',signal:'bad'};
      if(n>10)return{text:'Elevated short interest — notable bearish conviction',signal:'warn'};
      if(n>5)return{text:'Moderate short interest — some skepticism',signal:'neutral'};
      return{text:'Low short interest — market broadly confident',signal:'good'};
    default:
      return{text:'',signal:'neutral'};
  }
}

function calcFundamentalAdj(ticker,overrideM){
  const m=overrideM||METRICS[ticker];
  if(!m)return{rAdj:0,rwAdj:0};
  let rAdj=0,rwAdj=0;
  // Beta → risk
  const beta=parseFloat(m.beta);
  if(!isNaN(beta)){
    if(beta>=2.5)rAdj+=10;
    else if(beta>=1.8)rAdj+=6;
    else if(beta>=1.4)rAdj+=3;
    else if(beta<=0.6)rAdj-=6;
    else if(beta<=0.8)rAdj-=3;
  }
  // Debt/Equity → risk
  const de=parseFloat(m.debtEq);
  if(!isNaN(de)&&de>=0){
    if(de>4)rAdj+=8;
    else if(de>2)rAdj+=5;
    else if(de>1)rAdj+=2;
    else if(de<0.3)rAdj-=4;
  }
  // Short float → risk
  const sf=parseFloat(m.shortFloat);
  if(!isNaN(sf)){
    if(sf>20)rAdj+=8;
    else if(sf>10)rAdj+=5;
    else if(sf>5)rAdj+=2;
  }
  // Analyst rating → reward
  if(m.analystRating==='Strong Buy')rwAdj+=8;
  else if(m.analystRating==='Buy')rwAdj+=4;
  else if(m.analystRating==='Hold')rwAdj-=2;
  else if(m.analystRating==='Sell'){rwAdj-=10;rAdj+=5;}
  // ROE → reward
  const roe=parseFloat(m.roe);
  if(!isNaN(roe)){
    if(roe>80)rwAdj+=6;
    else if(roe>30)rwAdj+=3;
    else if(roe<5&&roe>=0)rwAdj-=4;
    else if(roe<0)rwAdj-=6;
  }
  // Dividend yield → modest reward boost
  const dy=parseFloat(m.divYield);
  if(!isNaN(dy)&&dy>3)rwAdj+=3;
  // Clamp adjustments
  return{rAdj:Math.round(Math.max(-12,Math.min(12,rAdj))),rwAdj:Math.round(Math.max(-12,Math.min(12,rwAdj)))};
}

// Verdict based on risk vs reward correlation
function getRRVerdict(risk,reward){
  const diff=reward-risk;
  if(diff>=20)return{label:'Favorable Ratio',color:'#22c55e',desc:'Reward potential outweighs the risk'};
  if(diff>=0)return{label:'Balanced',color:'#60a5fa',desc:'Risk and reward are roughly in line'};
  if(diff>=-15)return{label:'Risk-Heavy',color:'#f97316',desc:'More risk than reward potential'};
  return{label:'Unfavorable',color:'#ef4444',desc:'High risk with limited upside — speculate carefully'};
}

// ── SVG Chart ────────────────────────────────────────────────────────────────
function PriceChart({data,color,range}){
  const [tip,setTip]=useState(null);
  const W=800,H=220,PL=68,PR=14,PT=8,PB=28;
  if(!data||data.length<2)return<div style={{height:220,display:'flex',alignItems:'center',justifyContent:'center',color:'#4b5576'}}>Loading chart…</div>;
  const prices=data.map(d=>d.price).filter(Boolean);
  if(!prices.length)return null;
  const mn=Math.min(...prices),mx=Math.max(...prices),rnge=mx-mn||1;
  const tx=i=>PL+(i/(data.length-1))*(W-PL-PR);
  const ty=p=>H-PB-((p-mn)/rnge)*(H-PT-PB);
  const pathD=data.map((d,i)=>`${i===0?'M':'L'} ${tx(i).toFixed(1)} ${ty(d.price).toFixed(1)}`).join(' ');
  const areaD=`${pathD} L ${tx(data.length-1).toFixed(1)} ${(H-PB).toFixed(1)} L ${tx(0).toFixed(1)} ${(H-PB).toFixed(1)} Z`;
  const ticks=[0,0.25,0.5,0.75,1].map(t=>mn+t*rnge);
  const labelIdxs=pickXLabels(data,range||'3M');
  const fmtY=p=>p>=1000?'$'+Math.round(p).toLocaleString():p>=1?'$'+p.toFixed(2):p>=0.01?'$'+p.toFixed(3):'$'+p.toFixed(6);
  return(
    <div style={{position:'relative',width:'100%',userSelect:'none'}}>
      <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:'block',overflow:'visible'}}>
        <defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.22"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
        {ticks.map((p,i)=>(
          <g key={i}>
            <line x1={PL} x2={W-PR} y1={ty(p)} y2={ty(p)} stroke="#1a1f35" strokeWidth="1"/>
            <text x={PL-6} y={ty(p)+4} textAnchor="end" fill="#4b5576" fontSize="10">{fmtY(p)}</text>
          </g>
        ))}
        <path d={areaD} fill="url(#cg)"/>
        <path d={pathD} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        {labelIdxs.map((idx,i)=>(
          <text key={i} x={tx(idx)} y={H-6} textAnchor="middle" fill="#4b5576" fontSize="10">{data[idx].date}</text>
        ))}
        {data.map((d,i)=>(
          <rect key={i} x={tx(i)-6} y={PT} width="12" height={H-PT-PB} fill="transparent" style={{cursor:'crosshair'}}
            onMouseEnter={()=>setTip({i,...d})} onMouseLeave={()=>setTip(null)}/>
        ))}
        {tip&&(()=>{
          const px=tx(tip.i),py=ty(tip.price);
          const bx=Math.min(Math.max(px-62,PL),W-PR-126);
          return(<g>
            <line x1={px} x2={px} y1={PT} y2={H-PB} stroke={color} strokeWidth="1" strokeDasharray="4 3" opacity="0.5"/>
            <circle cx={px} cy={py} r="5" fill={color} stroke="#080b14" strokeWidth="2"/>
            <rect x={bx} y={py-52} width="126" height="44" rx="8" fill="#1a1f35" stroke="#2d3552" strokeWidth="1"/>
            <text x={bx+63} y={py-33} textAnchor="middle" fill="#64748b" fontSize="11">{tip.date}</text>
            <text x={bx+63} y={py-14} textAnchor="middle" fill="#e2e8f0" fontSize="15" fontWeight="700">{fmtPrice(tip.price)}</text>
          </g>);
        })()}
      </svg>
    </div>
  );
}

// ── AI Analysis Generator (for any stock not in the featured DB) ─────────────
function genAI(ticker,name,sector,cat,metrics,priceData){
  const{eps,beta,divYield,hi52,lo52,analystRating,roe}=metrics||{};
  const price=priceData?.price,pct=priceData?.pct;
  const epsNum=eps?parseFloat(eps.replace(/[$,]/g,'')):null;
  const betaNum=beta!=null?parseFloat(beta):null;
  const divNum=divYield?parseFloat(divYield):null;
  const pStr=price?(price>=1000?'$'+Math.round(price).toLocaleString():'$'+price.toFixed(2)):'the current price';
  const pctStr=pct!=null?` (${pct>=0?'+':''}${pct.toFixed(2)}% today)`:'';
  const sDesc=cat==='etf'?'an exchange-traded fund':`a publicly traded ${sector||'company'}`;

  // Simple tab
  let simple=`${name} (${ticker}) is ${sDesc}, currently trading at ${pStr}${pctStr}.`;
  if(epsNum!=null&&epsNum>0)simple+=` The company is profitable with earnings of ${eps} per share.`;
  else if(epsNum!=null&&epsNum<0)simple+=` The company is currently running at a loss (EPS ${eps}).`;
  if(analystRating)simple+=` Wall Street analysts currently rate it a ${analystRating}.`;
  simple+=` Use the chart above to see price history and momentum.`;

  // Health tab
  let health='';
  if(epsNum!=null)health+=epsNum>0?`${ticker} is profitable with EPS of ${eps} — a positive sign for investors. `:`${ticker} is currently unprofitable (EPS: ${eps}), which increases risk. `;
  if(betaNum!=null){
    if(betaNum<0.8)health+=`Its beta of ${beta} means it's less volatile than the broader market — suits conservative investors. `;
    else if(betaNum<1.3)health+=`A beta of ${beta} means it moves roughly in line with the S&P 500. `;
    else health+=`With a beta of ${beta}, this stock is more volatile than the market — expect bigger swings. `;
  }
  if(divNum&&divNum>0)health+=`It pays a ${divYield} dividend, providing regular income. `;
  if(hi52&&lo52)health+=`Over the past year it traded between ${lo52} and ${hi52}. `;
  if(roe)health+=`Return on equity of ${roe} shows how efficiently it generates profit from shareholders' money. `;
  if(!health)health=`Live financial data is loading for ${ticker}. Check the chart for price trend and the metrics panel below for key stats as they populate.`;

  // Worth tab
  let worth='';
  if(analystRating){
    const rMap={'Strong Buy':`Analysts have a strong consensus: ${analystRating}. The majority believe this stock has significant upside from here.`,'Buy':`Analysts lean bullish with a ${analystRating} rating — most see more upside than downside at ${pStr}.`,'Hold':`Analysts rate this a ${analystRating}, suggesting it's fairly priced. Upside may be limited unless fundamentals improve.`,'Sell':`Analysts currently rate this a ${analystRating}. Most see downside risk — proceed carefully at ${pStr}.`};
    worth+=(rMap[analystRating]||`Analyst consensus: ${analystRating}.`)+' ';
  }
  if(epsNum!=null&&epsNum>0&&price){
    const pe=(price/epsNum).toFixed(1);
    worth+=`At ${pStr} with EPS of ${eps}, the implied P/E is ~${pe}x. `;
    worth+=parseFloat(pe)<15?`That's relatively cheap by historical market standards. `:parseFloat(pe)<28?`That's a reasonable valuation. `:`That's a premium multiple — the market is pricing in strong future growth. `;
  }
  if(betaNum!=null&&betaNum>1.5)worth+=`The high beta (${beta}) means bigger risk — size your position carefully. `;
  if(!worth)worth=`Compare the current price to the 52-week range above to understand where ${ticker} sits historically. Review the analyst rating and PE ratio in the metrics panel before deciding.`;

  // Pros
  const pros=[];
  if(epsNum!=null&&epsNum>0)pros.push(`Profitable — positive EPS of ${eps}`);
  if(analystRating==='Strong Buy'||analystRating==='Buy')pros.push(`${analystRating} consensus from Wall Street analysts`);
  if(divNum&&divNum>0)pros.push(`Pays a ${divYield} dividend yield`);
  if(betaNum!=null&&betaNum<1.0)pros.push(`Low beta (${beta}) — less volatile than the market`);
  if(roe)pros.push(`${roe} return on equity`);
  pros.push('Publicly traded — regulated, transparent, liquid');
  if(hi52&&lo52)pros.push(`52-week range ${lo52}–${hi52} visible in chart`);

  // Cons
  const cons=[];
  if(epsNum!=null&&epsNum<0)cons.push('Currently unprofitable — negative EPS');
  if(betaNum!=null&&betaNum>1.5)cons.push(`High volatility — beta of ${beta}`);
  if(!divNum||divNum===0)cons.push('No dividend income');
  if(analystRating==='Sell')cons.push('Analyst consensus rating is Sell');
  cons.push("Extended AI analysis available for featured stocks in the curated database");
  cons.push("Always do your own research before investing");

  return{ai:{simple,health,worth},pros:pros.slice(0,4),cons:cons.slice(0,4)};
}

    let animId,W,H,dpr;
    let orbs=[],particles=[];
    let mouse={x:-999,y:-999};
    let t=0;

    const ORB_DEFS=[
      {ox:0.18,oy:0.25,rf:0.62,vx:0.11,vy:0.07,c:'59,130,246'},   // blue
      {ox:0.78,oy:0.65,rf:0.68,vx:-0.09,vy:-0.11,c:'124,58,237'},  // purple
      {ox:0.50,oy:0.88,rf:0.50,vx:0.14,vy:-0.07,c:'38,198,166'},   // teal

    function initOrbs(){
      orbs=ORB_DEFS.map(d=>({
        x:d.ox*W, y:d.oy*H, r:d.rf*H,
        vx:d.vx, vy:d.vy, c:d.c, seed:Math.random()*100
      }));
    }

    function initParticles(){
      const count=Math.min(Math.floor(W*H/12000),110);
      const COLORS=['38,198,166','59,130,246','124,58,237','99,102,241','168,85,247'];
      particles=Array.from({length:count},(_,i)=>({
        x:Math.random()*W, y:Math.random()*H,
        vx:(Math.random()-0.5)*0.45,
        vy:(Math.random()-0.5)*0.45,
        r:0.8+Math.random()*2.2,
        op:0.35+Math.random()*0.55,

    }

    function resize(){
      dpr=window.devicePixelRatio||1;
      W=window.innerWidth; H=window.innerHeight;
      canvas.width=W*dpr; canvas.height=H*dpr;
      canvas.style.width='100vw'; canvas.style.height='100vh';
      ctx.setTransform(dpr,0,0,dpr,0,0);
      initOrbs(); initParticles();
    }

    function onMove(e){mouse.x=e.clientX;mouse.y=e.clientY;}
    window.addEventListener('mousemove',onMove);

    function draw(){
      ctx.clearRect(0,0,W,H);
      t+=0.0025;

      // ── Aurora orbs ──
      for(const o of orbs){
        o.x+=o.vx+Math.sin(t*0.8+o.seed)*0.35;
        o.y+=o.vy+Math.cos(t*0.6+o.seed)*0.25;
        if(o.x<-o.r)o.x=W+o.r; if(o.x>W+o.r)o.x=-o.r;
        if(o.y<-o.r)o.y=H+o.r; if(o.y>H+o.r)o.y=-o.r;

        g.addColorStop(0.35,`rgba(${o.c},0.07)`);
        g.addColorStop(0.7,`rgba(${o.c},0.02)`);
        g.addColorStop(1,`rgba(${o.c},0)`);
        ctx.fillStyle=g;
        ctx.beginPath(); ctx.arc(o.x,o.y,o.r,0,Math.PI*2); ctx.fill();
      }

      // ── Particles + connections ──
      for(let i=0;i<particles.length;i++){
        const p=particles[i];
        // Mouse repulsion
        const mdx=p.x-mouse.x,mdy=p.y-mouse.y;
        const md=Math.sqrt(mdx*mdx+mdy*mdy);
        if(md<110&&md>0){
          const f=(110-md)/110;
          p.vx+=(mdx/md)*f*0.06; p.vy+=(mdy/md)*f*0.06;
        }
        // Speed cap
        const sp=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
        if(sp>1.1){p.vx*=0.94;p.vy*=0.94;}
        p.x+=p.vx; p.y+=p.vy;
        if(p.x<0)p.x=W; if(p.x>W)p.x=0;
        if(p.y<0)p.y=H; if(p.y>H)p.y=0;

        // Draw connections
        for(let j=i+1;j<particles.length;j++){
          const q=particles[j];
          const dx=p.x-q.x,dy=p.y-q.y;
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<140){
            const alpha=(1-d/140)*0.22;
            ctx.strokeStyle=`rgba(${p.c},${alpha})`;
            ctx.lineWidth=0.7;
            ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke();
          }
        }
        // Draw dot
        ctx.fillStyle=`rgba(${p.c},${p.op})`;
        ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fill();
      }

      // ── Edge vignette ──
      const vig=ctx.createRadialGradient(W/2,H/2,H*0.15,W/2,H/2,Math.max(W,H)*0.78);
      vig.addColorStop(0,'rgba(1,2,13,0)');
      vig.addColorStop(1,'rgba(1,2,13,0.82)');
      ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

      animId=requestAnimationFrame(draw);
    }

    resize();
    window.addEventListener('resize',resize);
    draw();
    return()=>{
      cancelAnimationFrame(animId);
      window.removeEventListener('resize',resize);
      window.removeEventListener('mousemove',onMove);
    };

  // Live-refresh a static-seeded screener tab using Finnhub or Stooq
  async function refreshStaticScreener(scrId,rows){
    const fk=fhKey||'';
    const tickers=rows.map(r=>r.ticker);
    const settled=fk
      ? await Promise.allSettled(tickers.map(t=>fhQuote(t,fk).then(q=>({ticker:t,price:q.price,change:q.change,pct:q.pct}))))
      : await Promise.allSettled(tickers.map(t=>stooqQuote(t,'stock').then(q=>({ticker:t,price:q.price,change:q.change,pct:q.pct}))));
    const liveMap={};
    settled.forEach(r=>{if(r.status==='fulfilled'&&r.value.price)liveMap[r.value.ticker]=r.value;});
    const updated=rows.map(r=>liveMap[r.ticker]?{...r,...liveMap[r.ticker]}:r);
    setScreenerData(prev=>({...prev,[scrId]:updated}));
  }

  async function loadScreener(scrId){
    if(screenerData[scrId])return;
    // Always seed from static data first — instant, no network needed
    const seed=STATIC_SCREENER[scrId];
    if(seed){
      setScreenerData(prev=>({...prev,[scrId]:seed}));
      setScreenerLoading(false);
      // Then refresh prices live in the background
      refreshStaticScreener(scrId,seed);
      return;
    }
    // No static data and no live source available — show empty
    setScreenerLoading(false);
  }

  async function loadLiveData(a){
    // ── Crypto: always CoinGecko ─────────────────────────────────────────────
    if(a.cat==='crypto'){
      try{
        const id=a.cgId||CG_IDS[a.ticker];
        if(id){
          const mkt=await cgMarkets();
          const coin=mkt.find(c=>c.id===id);
          if(coin){setLivePrice({price:coin.current_price,change:coin.price_change_24h,pct:coin.price_change_percentage_24h,live:true});setLoadingLive(false);return;}
        }
      }catch(e){}
      setLivePrice({price:a.price,change:a.change,pct:a.pct,live:false});
      setLoadingLive(false);
      return;
    }
    // ── Stocks / ETFs / Commodities ──────────────────────────────────────────
    // 1. Finnhub (when key is set) — fast, reliable, real-time
    if(fhKey){
      try{
        const q=await fhQuote(a.ticker,fhKey);
        setLivePrice({price:q.price,change:q.change,pct:q.pct,live:true,isMarketOpen:q.isMarketOpen});
        setLoadingLive(false);
        // Fetch fundamentals in background — don't block price display
        Promise.allSettled([fhMetrics(a.ticker,fhKey),fhRecommendation(a.ticker,fhKey)]).then(([mRes,rRes])=>{
          const mData=mRes.status==='fulfilled'?mRes.value:{};
          const rating=rRes.status==='fulfilled'?rRes.value:null;
          // Only mark as live if Finnhub actually returned at least one metric
          const gotLive=(mRes.status==='fulfilled'&&Object.keys(mData).filter(k=>k!=='peRaw').some(k=>mData[k]!=null))||!!rating;
          const staticM=METRICS[a.ticker]||{};
          const merged={
            ...staticM,
            ...(mData.eps!=null?{eps:mData.eps}:{}),
            ...(mData.beta!=null?{beta:mData.beta}:{}),
            ...(mData.divYield!=null?{divYield:mData.divYield}:{}),
            ...(mData.hi52!=null?{hi52:mData.hi52}:{}),
            ...(mData.lo52!=null?{lo52:mData.lo52}:{}),
            ...(mData.debtEq!=null?{debtEq:String(mData.debtEq)}:{}),
            ...(mData.roe!=null?{roe:mData.roe}:{}),
            ...(rating?{analystRating:rating}:{}),
            _live:gotLive, // flag: true = badge shows, false = static fallback only
          };
          if(Object.keys(merged).length>0)setLiveMetrics(merged);
          if(mData.peRaw!=null){
            setAsset(prev=>prev&&prev.ticker===a.ticker?{...prev,pe:`${parseFloat(mData.peRaw.toFixed(1))}x`}:prev);
          }
          // For shell assets: regenerate AI analysis now that we have real metrics
          setAsset(prev=>{
            if(!prev||prev.ticker!==a.ticker||!prev.isShell)return prev;
            const generated=genAI(prev.ticker,prev.name,prev.sector,prev.cat,merged,{price:q.price,pct:q.pct});
            return{...prev,...generated};
          });
        }).catch(()=>{});
        return;
      }catch(e){
        if(!a.isShell&&a.cat==='stock'){
          // DB stock — show its known static price, Stooq won't add much
          setLivePrice({price:a.price||0,change:a.change||0,pct:a.pct||0,live:false});
          setLoadingLive(false);
          return;
        }
        // Commodities, ETFs, shell assets — fall through to Stooq for a live price
      }
    }
    // 2. Stooq fallback — runs when: (a) no Finnhub key, OR (b) Finnhub failed for non-stock
    try{
      const q=await stooqQuote(a.ticker,a.cat);
      if(a.isShell){
        // Refresh AI with real price data (no metrics yet, but price/pct gives context)
        setAsset(prev=>{
          if(!prev||prev.ticker!==a.ticker)return prev;
          const staticM=METRICS[prev.ticker]||{};
          const generated=genAI(prev.ticker,q.name||prev.name,prev.sector,prev.cat,Object.keys(staticM).length?staticM:null,{price:q.price,pct:q.pct});
          return{...prev,name:q.name||prev.name,...generated};
        });
      }
      setLivePrice({price:q.price,change:q.change,pct:q.pct,live:true});
    }catch(e){
      // Stooq failed — DB assets have a known static price to fall back to;
      // shell assets (searched stocks with no DB entry) genuinely have no price
      if(a.isShell){
        setLivePrice({price:null,change:null,pct:null,live:false});
      }else{
        setLivePrice({price:a.price||0,change:a.change||0,pct:a.pct||0,live:false});
      }
    }
    setLoadingLive(false);
  }

    fetchRangeChart(asset,chartRange).then(data=>{

  // ── Cosmo AI send — calls /api/cosmo on your server (key is hidden server-side) ──
  async function cosmoSend(){
    const msg=cosmoInput.trim();
    if(!msg||cosmoLoading)return;
    const updated=[...cosmoMsgs,{role:'user',content:msg}];
    setCosmoMsgs(updated);
    setCosmoInput('');
    setCosmoLoading(true);
    // Detect if running locally — /api/cosmo only exists on the deployed Vercel server
    const isLocal=window.location.protocol==='file:'||window.location.hostname==='localhost'||window.location.hostname==='127.0.0.1';
    if(isLocal){
      setCosmoMsgs(m=>[...m,{role:'assistant',content:"🚀 Cosmo is ready — but AI chat only works on the live site. Deploy to Vercel and I'll be fully powered up! In the meantime you can explore everything else in TradeIQ."}]);
      setCosmoLoading(false);
      return;
    }
    try{
      const res=await fetch('/api/cosmo',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages:updated})
      });
      if(!res.ok){
        const err=await res.json().catch(()=>({}));
        throw new Error(err?.error||`Server error ${res.status}`);
      }
      const data=await res.json();
      setCosmoMsgs(m=>[...m,{role:'assistant',content:data.reply||'Sorry, I had trouble with that response.'}]);
    }catch(e){
      setCosmoMsgs(m=>[...m,{role:'assistant',content:`⚠️ ${e.message||'Connection error. Please try again.'}`}]);
    }
    setCosmoLoading(false);
  }

                  const hit=alertTriggered.includes(al.id);
                  return(
                    <div key={al.id} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:hit?'rgba(34,197,94,0.08)':'#12172a',border:`1px solid ${hit?'rgba(34,197,94,0.3)':'#1e2540'}`,borderRadius:10,padding:'10px 14px'}}>
                      <div>
                        <div style={{fontSize:13,fontWeight:700,color:'#e2e8f0'}}>{fmtPrice(al.target)}</div>
                        <div style={{fontSize:11,color:'#4b5576',marginTop:1}}>{al.dir==='above'?'▲ Alert when above':'▼ Alert when below'}</div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        {hit&&<span style={{fontSize:10,fontWeight:800,color:'#22c55e',background:'rgba(34,197,94,0.15)',border:'1px solid rgba(34,197,94,0.3)',borderRadius:20,padding:'2px 8px'}}>TRIGGERED</span>}
                        <button onClick={()=>removeAlert(al.id)} style={{background:'rgba(239,68,68,0.08)',border:'1px solid rgba(239,68,68,0.15)',color:'#ef4444',cursor:'pointer',fontSize:11,fontWeight:700,padding:'4px 8px',borderRadius:7,lineHeight:1}}>✕</button>
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </div>

          {/* ── NEWS FEED ── */}
          <div style={{background:'#0a0d1a',border:'1px solid #1a1f35',borderRadius:16,padding:'20px 22px',marginTop:12}}>
            <div style={{fontWeight:700,fontSize:14,marginBottom:14,display:'flex',alignItems:'center',gap:8}}>
              ◈ Latest News
              {newsLoading&&<div style={{width:12,height:12,border:'2px solid #3b82f6',borderTopColor:'transparent',borderRadius:'50%',animation:'spin 0.8s linear infinite'}}/>}
            </div>
            {newsData.length===0&&!newsLoading&&(
              <div style={{color:'#4b5576',fontSize:13}}>News loads when hosted on a server (localhost or live URL).</div>
            )}
            {newsData.map((n,i)=>(
              <a key={i} href={n.url} target="_blank" rel="noopener noreferrer"
                style={{display:'block',padding:'10px 0',borderTop:i>0?'1px solid #1a1f35':'none',textDecoration:'none',color:'inherit'}}>
                <div style={{fontSize:14,color:'#e2e8f0',fontWeight:500,lineHeight:1.45,marginBottom:4}}>{n.title}</div>
                <div style={{fontSize:11,color:'#4b5576'}}>{n.source}{n.time?` · ${n.time}`:''}</div>
              </a>
            ))}
          </div>

          {/* Refresh button */}
          <div style={{display:'flex',justifyContent:'center',marginBottom:20}}>
            <button onClick={()=>loadLiveData(asset)} disabled={loadingLive}
              style={{display:'flex',alignItems:'center',gap:8,background:'#12172a',border:'1px solid #1e2540',borderRadius:10,padding:'10px 20px',color:'#64748b',cursor:'pointer',fontSize:13,opacity:loadingLive?0.5:1}}>
              <I.Refresh s={14}/> Refresh Live Data
            </button>
          </div>
        </main>
      )}

      {/* ── RISK / REWARD BAR ── */}
      {asset&&(()=>{
        const {rAdj,rwAdj}=calcFundamentalAdj(asset.ticker,liveMetrics||undefined);
        const riskScore=Math.min(99,Math.max(1,(asset.risk||50)+rAdj));
        const rewardScore=Math.min(99,Math.max(1,getReward(asset)+rwAdj));
        const verdict=getRRVerdict(riskScore,rewardScore);
        const rColor=rc(riskScore);
        const rwColor=rewardColor(rewardScore);
        return(
          <div style={{position:'sticky',bottom:0,background:'#0b0e1c',borderTop:'1px solid #1a1f35',padding:'14px 28px',zIndex:100}}>
            <div style={{maxWidth:1100,margin:'0 auto'}}>
              <div style={{display:'flex',alignItems:'flex-start',gap:24}}>

                {/* ── Two bars ── */}
                <div style={{flex:1,display:'flex',flexDirection:'column',gap:10}}>

                  {/* Risk bar */}
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:72,flexShrink:0}}>
                      <div style={{fontSize:9,color:'#4b5576',fontWeight:700,letterSpacing:'0.08em',marginBottom:2}}>RISK</div>
                      <div style={{fontSize:20,fontWeight:900,color:rColor,lineHeight:1}}>{riskScore}<span style={{fontSize:11,color:'#4b5576',fontWeight:500}}>/100</span></div>
                    </div>
                    <div style={{flex:1,position:'relative',height:10}}>
                      {/* Track */}
                      <div style={{position:'absolute',inset:0,borderRadius:5,background:'linear-gradient(to right,#22c55e,#4ade80,#eab308,#f97316,#ef4444,#dc2626)',opacity:0.18}}/>
                      {/* Fill */}
                      <div style={{position:'absolute',top:0,left:0,height:'100%',width:`${riskScore}%`,borderRadius:5,background:`linear-gradient(to right,#22c55e,${rColor})`,transition:'width 1s ease',boxShadow:`0 0 8px ${rColor}50`}}/>
                      {/* Knob */}
                      <div style={{position:'absolute',top:'50%',left:`${riskScore}%`,transform:'translate(-50%,-50%)',width:14,height:14,background:rColor,borderRadius:'50%',border:'2.5px solid #0b0e1c',boxShadow:`0 0 8px ${rColor}`,transition:'left 1s ease'}}/>
                    </div>
                    <div style={{width:120,flexShrink:0,fontSize:11,color:rColor,fontWeight:600}}>{asset.rl}</div>
                  </div>

                  {/* Reward bar */}
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:72,flexShrink:0}}>
                      <div style={{fontSize:9,color:'#4b5576',fontWeight:700,letterSpacing:'0.08em',marginBottom:2}}>REWARD</div>
                      <div style={{fontSize:20,fontWeight:900,color:rwColor,lineHeight:1}}>{rewardScore}<span style={{fontSize:11,color:'#4b5576',fontWeight:500}}>/100</span></div>
                    </div>
                    <div style={{flex:1,position:'relative',height:10}}>
                      {/* Track */}
                      <div style={{position:'absolute',inset:0,borderRadius:5,background:'#1a1f35'}}/>
                      {/* Fill */}
                      <div style={{position:'absolute',top:0,left:0,height:'100%',width:`${rewardScore}%`,borderRadius:5,background:`linear-gradient(to right,#818cf8,#60a5fa,${rwColor})`,transition:'width 1s ease',boxShadow:`0 0 8px ${rwColor}50`}}/>
                      {/* Knob */}
                      <div style={{position:'absolute',top:'50%',left:`${rewardScore}%`,transform:'translate(-50%,-50%)',width:14,height:14,background:rwColor,borderRadius:'50%',border:'2.5px solid #0b0e1c',boxShadow:`0 0 8px ${rwColor}`,transition:'left 1s ease'}}/>
                    </div>
                    <div style={{width:120,flexShrink:0,fontSize:11,color:rwColor,fontWeight:600}}>{asset.rw}</div>
                  </div>
                </div>

                {/* ── Verdict panel ── */}
                <div style={{flexShrink:0,background:'#12172a',border:`1px solid ${verdict.color}30`,borderRadius:12,padding:'10px 16px',minWidth:170,textAlign:'center'}}>
                  <div style={{fontSize:10,color:'#4b5576',fontWeight:700,letterSpacing:'0.07em',marginBottom:4}}>R/R VERDICT</div>
                  <div style={{fontSize:14,fontWeight:800,color:verdict.color,marginBottom:4}}>{verdict.label}</div>
                  <div style={{fontSize:10,color:'#64748b',lineHeight:1.4}}>{verdict.desc}</div>
                  {/* Mini ratio indicator */}
                  <div style={{marginTop:8,display:'flex',alignItems:'center',gap:6,justifyContent:'center'}}>
                    <div style={{fontSize:10,color:'#4b5576'}}>R</div>
                    <div style={{flex:1,height:3,background:'#1a1f35',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${riskScore}%`,background:rColor,borderRadius:2}}/>
                    </div>
                    <div style={{fontSize:10,color:'#4b5576'}}>Rw</div>
                    <div style={{flex:1,height:3,background:'#1a1f35',borderRadius:2,overflow:'hidden'}}>
                      <div style={{height:'100%',width:`${rewardScore}%`,background:rwColor,borderRadius:2}}/>
                    </div>
                  </div>
                </div>

              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TradeIQ/>);
</script>
</body>
</html>
